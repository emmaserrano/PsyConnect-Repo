<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>PsyConnect Admin</title>
</head>

<body>

<h1>Agregar Psicólogo</h1>

<form
        action="/admin/save"
        method="post"
        enctype="multipart/form-data">

    <p>
        Nombre:
        <input
                type="text"
                name="name"
                required>
    </p>

    <p>
        Especialidad:
        <input
                type="text"
                name="specialty"
                required>
    </p>

    <p>
        WhatsApp:
        <input
                type="text"
                name="phone"
                required>
    </p>

    <p>
        Ciudad:
        <input
                type="text"
                name="city"
                required>
    </p>

    <p>
        Correo:
        <input
                type="email"
                name="email">
    </p>

    <p>
        Foto:
        <input
                type="file"
                name="photoFile"
                accept="image/*">
    </p>

    <p>
        Descripción:
    </p>

    <textarea
            rows="6"
            cols="40"
            name="description"></textarea>

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

</body>
</html>
